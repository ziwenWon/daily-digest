<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Digest</title>
  <style>
    :root { color-scheme: light; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #f4f4f6;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #111827; }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
      padding: 3px 8px; border-radius: 20px;
      background: #dcfce7; color: #15803d;
    }
    .header-date { font-size: 13px; color: #9ca3af; }

    /* ── Tabs ── */
    .tabs {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 28px;
      display: flex;
      overflow-x: auto;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center; gap: 7px;
      padding: 14px 18px;
      font-size: 13.5px; font-weight: 500;
      color: #9ca3af; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s;
      user-select: none;
    }
    .tab:hover:not(.active) { color: #374151; }
    .tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }

    /* ── Main ── */
    .main { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .news-list { display: flex; flex-direction: column; gap: 12px; }

    /* ── Card ── */
    .news-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px 16px;
      border: 1px solid #e5e7eb;
      transition: box-shadow 0.2s, transform 0.12s, opacity 0.25s, background 0.25s;
      position: relative;
    }
    .news-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    /* Read state */
    .news-card.is-read {
      background: #f9f9fb;
      opacity: 0.55;
    }
    .news-card.is-read .card-title a { color: #adb5bd !important; }
    .news-card.is-read .card-summary  { color: #ced4da; }
    .news-card.is-read .story-link    { color: #ced4da !important; }

    .read-hint {
      position: absolute; bottom: 10px; left: 22px;
      font-size: 10.5px; color: #d1d5db;
      pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
    .news-card:hover .read-hint { opacity: 1; }

    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .cat-tag {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.4px;
      text-transform: uppercase; padding: 3px 9px; border-radius: 6px; flex-shrink: 0;
    }
    .tag-tech       { background: #eef2ff; color: #4338ca; }
    .tag-business   { background: #ecfdf5; color: #065f46; }
    .tag-biotech    { background: #faf5ff; color: #7e22ce; }
    .tag-aesthetics { background: #fff1f2; color: #be123c; }

    .card-source { font-size: 12px; color: #9ca3af; }
    .age-tag {
      font-size: 10.5px; font-weight: 600; padding: 2px 7px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .age-fresh   { background: #dcfce7; color: #15803d; }   /* ≤ 7 days */
    .age-recent  { background: #fef9c3; color: #854d0e; }   /* 8–30 days */
    .age-old     { background: #f3f4f6; color: #9ca3af; }   /* > 30 days */
    .spacer { flex: 1; }
    .read-dot { font-size: 11px; color: #9ca3af; display: none; }
    .news-card.is-read .read-dot { display: inline; }

    .card-title {
      font-size: 15px; font-weight: 650; color: #111827;
      line-height: 1.45; margin-bottom: 8px;
    }
    .card-title a {
      color: #111827;
      text-decoration: none;
    }
    .card-title a:hover { color: #4f46e5; text-decoration: underline; }

    .card-summary {
      font-size: 13.5px; color: #4b5563;
      line-height: 1.7; transition: color 0.2s;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
    }
    .mark-read-btn {
      font-size: 11.5px; color: #9ca3af;
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .mark-read-btn:hover { background: #f3f4f6; color: #374151; }
    .news-card.is-read .mark-read-btn { color: #4f46e5; }

    .story-link {
      font-size: 13px; font-weight: 600; color: #4f46e5;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px;
      background: #eef2ff;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .story-link:hover { background: #e0e7ff; text-decoration: none; }

    /* ── Footer bar ── */
    .update-bar {
      text-align: center; font-size: 11.5px; color: #c4c4cc;
      padding: 20px 0 4px;
    }
    .update-bar a { color: #9ca3af; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">📰 Daily Digest</span>
    <span class="badge">LIVE</span>
  </div>
  <div class="header-date" id="headerDate">—</div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="0">🤖 Tech &amp; AI</div>
  <div class="tab" data-tab="1">📈 Business &amp; Finance</div>
  <div class="tab" data-tab="2">🧬 Biotech</div>
  <div class="tab" data-tab="3">✨ Med Aesthetics</div>
</div>

<div class="main">
  <div id="panel-0" class="panel active"></div>
  <div id="panel-1" class="panel"></div>
  <div id="panel-2" class="panel"></div>
  <div id="panel-3" class="panel"></div>
  <div class="update-bar">
    Last updated: <span id="lastUpdated">April 24, 2026</span>
    &nbsp;·&nbsp; Click a card to mark as read
  </div>
</div>

<script>

  { p:1, tag:'business', cat:'Business', src:'WEF',

    url:'https://www.cnbc.com/2026/04/22/stock-market-today-live-updates.html',

    summary:'U.S. stocks retreated April 23 with the S&P 500 off 0.41% and Nasdaq down 0.89% as geopolitical tension pushed WTI crude above $96.50.' },
  { p:1, tag:'business', cat:'Business', src:'CNBC',
    url:'https://www.cnbc.com/2026/04/22/stock-market-today-live-updates.html',
    title:'Goldman Sachs Delivers Its Best Quarter in Years on Trading Surge',
    summary:'Major U.S. banks reported strong Q1 2026 results, led by Goldman Sachs posting its best quarter in years and Morgan Stanley surging on trading revenue.' },

    url:'https://www.weforum.org/stories/2026/04/imf-downgrades-global-growth-and-other-finance-news-to-know/',

    title:'FSB Warns Geopolitical Conflict Poses Serious Financial Stability Risk',
    summary:'The FSB flagged that Middle East warfare, stretched asset valuations, and elevated non-bank leverage together pose a growing systemic threat.' },

  { p:2, tag:'biotech', cat:'Biotech', src:'BioPharma Dive',
    url:'https://www.biopharmadive.com/news/tortugas-biotech-startup-jonas-robichaud-hansoh-eisai/818076/',
    title:'Tortugas Neuroscience Launches from Stealth with $106M',
    summary:'Tortugas Neuroscience debuted with $106M in funding and CEO Jeff Jonas, bringing two brain-targeted drug candidates in-licensed from Hansoh and Eisai.' },

  { p:2, tag:'biotech', cat:'Biotech', src:'Fierce Biotech',

  // Medical Aesthetics
  { p:3, tag:'aesthetics', cat:'Med Aesthetics', src:'Yahoo Finance',
    url:'https://finance.yahoo.com/sectors/healthcare/articles/beauty-health-company-announces-corporate-120000695.html',

  { p:3, tag:'aesthetics', cat:'Med Aesthetics', src:'MedEsthetics',
    url:'https://www.medestheticsmag.com/home/article/22957605/insideout-and-innovative-whats-trending-in-aesthetics-for-2026',
    title:'Aesthetics Pivots to Holistic Inside-Out Regenerative Care in 2026',
    summary:'The aesthetics industry is shifting away from correction-focused procedures toward personalized, inside-out regenerative protocols that blend wellness with technology.' },
];
// @@NEWS_END@@

// ── Read state via localStorage ───────────────────────────────
const STORE_KEY = 'digest_read_v1';
function getRead() {
  try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveRead(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify([...s])); } catch {}
}
function toggleRead(id) {
  const s = getRead();
  s.has(id) ? s.delete(id) : s.add(id);
  saveRead(s);
  const card = document.getElementById('c'+id);
  if (!card) return;
  const isRead = s.has(id);
  card.classList.toggle('is-read', isRead);
  const btn  = card.querySelector('.mark-read-btn');
  const hint = card.querySelector('.read-hint');
  if (btn)  btn.textContent  = isRead ? '↩ Unmark' : '✓ Mark as read';
  if (hint) hint.textContent = isRead ? 'Click to unmark' : 'Click to mark as read';
}

// ── Tabs ──────────────────────────────────────────────────────
document.getElementById('tabBar').addEventListener('click', e => {
  const t = e.target.closest('.tab'); if (!t) return;
  const idx = t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  document.getElementById('panel-'+idx).classList.add('active');
});

// ── Date ──────────────────────────────────────────────────────
document.getElementById('headerDate').textContent = new Date().toLocaleDateString(
  'en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

// ── Render ────────────────────────────────────────────────────
function safeText(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ageClass(age) {
  if (!age) return '';
  if (age === 'Today' || age === 'Yesterday' || age.includes('d ago')) {
    const n = age === 'Today' ? 0 : age === 'Yesterday' ? 1 : parseInt(age);
    return n <= 7 ? 'age-fresh' : 'age-recent';
  }
  return 'age-old';
}
function buildCards(items) {
  const readSet = getRead();
  return '<div class="news-list">' + items.map(item => {
    const isRead = readSet.has(item.id);
    const ageBadge = item.age
      ? `<span class="age-tag ${ageClass(item.age)}">${safeText(item.age)}</span>` : '';
    return `
      <div class="news-card${isRead?' is-read':''}" id="c${item.id}" onclick="toggleRead(${item.id})" style="cursor:pointer">
        <div class="card-top">
          <span class="cat-tag tag-${item.tag}">${item.cat}</span>
          <span class="card-source">${safeText(item.src)}</span>
          <span class="spacer"></span>
          ${ageBadge}
          <span class="read-dot">✓ Read</span>
        </div>
        <div class="card-title">
          <a href="${safeText(item.url)}" target="_blank" rel="noopener noreferrer"
             onclick="event.stopPropagation()">${safeText(item.title)}</a>
        </div>
        <div class="card-summary">${safeText(item.summary)}</div>
        <div class="card-footer">
          <button class="mark-read-btn" onclick="event.stopPropagation(); toggleRead(${item.id})">
            ${isRead ? '↩ Unmark' : '✓ Mark as read'}
          </button>
          <a class="story-link" href="${safeText(item.url)}" target="_blank"
             rel="noopener noreferrer" onclick="event.stopPropagation()">
            Full story →
          </a>
        </div>
        <div class="read-hint">${isRead ? 'Click to unmark' : 'Click to mark as read'}</div>
      </div>`;
  }).join('') + '</div>';
}

NEWS.forEach((item, i) => item.id = i);
const byPanel = {};
NEWS.forEach(item => { (byPanel[item.p] = byPanel[item.p]||[]).push(item); });
for (const [p, items] of Object.entries(byPanel)) {
  document.getElementById('panel-'+p).innerHTML = buildCards(items);
}
</script>
</body>
</html>
