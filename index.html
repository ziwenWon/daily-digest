<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Daily News Digest",
  "schemaVersion": 1,
  "description": "Daily news digest covering Tech & AI, Business & Finance, Biotech, and Medical Aesthetics — with one-sentence English summaries generated dynamically via sample() on each load."
}
</script>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Digest</title>
  <style>
    :root { color-scheme: light; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #f4f4f6; color: #1a1a2e;
    }

    .header {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 20;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: #111827; }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 7px; border-radius: 20px; background: #dcfce7; color: #15803d;
    }
    .header-date { font-size: 12.5px; color: #9ca3af; }

    .tabs {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 0 20px; display: flex; overflow-x: auto;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center; gap: 6px;
      padding: 13px 16px; font-size: 13.5px; font-weight: 500;
      color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent;
      white-space: nowrap; transition: color 0.15s; user-select: none;
    }
    .tab:hover:not(.active) { color: #374151; }
    .tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }

    .main { max-width: 820px; margin: 0 auto; padding: 20px 16px 48px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .news-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Card ── */
    .news-card {
      background: #fff; border-radius: 12px; padding: 18px 20px 14px;
      border: 1px solid #e5e7eb; cursor: pointer;
      transition: box-shadow 0.18s, transform 0.12s, background 0.25s, opacity 0.25s;
      position: relative;
    }
    .news-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.08); transform: translateY(-1px); }

    /* Read state */
    .news-card.is-read { background: #f9f9fb; opacity: 0.62; }
    .news-card.is-read .card-title  { color: #adb5bd; }
    .news-card.is-read .card-summary { color: #ced4da; }

    /* Hover hint */
    .read-hint {
      position: absolute; bottom: 10px; left: 20px;
      font-size: 10.5px; color: #d1d5db; pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
    .news-card:hover .read-hint { opacity: 1; }

    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .cat-tag {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.4px;
      text-transform: uppercase; padding: 3px 8px; border-radius: 5px; flex-shrink: 0;
    }
    .tag-tech       { background: #eef2ff; color: #4338ca; }
    .tag-business   { background: #ecfdf5; color: #065f46; }
    .tag-biotech    { background: #faf5ff; color: #7e22ce; }
    .tag-aesthetics { background: #fff1f2; color: #be123c; }

    .card-source { font-size: 11.5px; color: #9ca3af; flex: 1; }
    .read-dot { font-size: 11px; color: #adb5bd; display: none; }
    .news-card.is-read .read-dot { display: inline; }

    .card-title {
      font-size: 14.5px; font-weight: 600; color: #111827;
      line-height: 1.45; margin-bottom: 7px; transition: color 0.2s;
    }
    /* Real <a> tag for title — native browser navigation */
    .title-link {
      color: inherit; text-decoration: none;
    }
    .title-link:hover { color: #4f46e5; text-decoration: underline; }
    .news-card.is-read .title-link:hover { color: #adb5bd; text-decoration: none; }

    .card-summary {
      font-size: 13px; color: #4b5563; line-height: 1.65;
      min-height: 20px; transition: color 0.2s;
    }
    .shimmer {
      height: 14px; width: 88%; border-radius: 4px;
      background: linear-gradient(90deg,#f0f0f0 25%,#e4e4e4 50%,#f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .card-footer {
      display: flex; justify-content: flex-end; margin-top: 14px;
    }
    /* Real <a> tag for Full story — native browser navigation */
    .story-link {
      font-size: 12px; font-weight: 500; color: #6366f1;
      text-decoration: none; display: inline-flex; align-items: center; gap: 2px;
    }
    .story-link:hover { text-decoration: underline; }
    .news-card.is-read .story-link { color: #adb5bd; }

    /* Loading */
    .section-loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 60px 20px; color: #9ca3af; font-size: 13px;
    }
    .spinner {
      width: 26px; height: 26px; border: 3px solid #e5e7eb;
      border-top-color: #4f46e5; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .update-bar {
      text-align: center; font-size: 11.5px; color: #c4c4cc;
      padding: 18px 0 4px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">📰 Daily Digest</span>
    <span class="badge">LIVE</span>
  </div>
  <div class="header-date" id="headerDate">—</div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="0">🤖 Tech &amp; AI</div>
  <div class="tab" data-tab="1">📈 Business &amp; Finance</div>
  <div class="tab" data-tab="2">🧬 Biotech</div>

<div class="main">
  <div id="panel-0" class="panel active"><div class="section-loading"><div class="spinner"></div><span>Generating summaries…</span></div></div>
  <div id="panel-1" class="panel"><div class="section-loading"><div class="spinner"></div><span>Generating summaries…</span></div></div>
  <div id="panel-2" class="panel"><div class="section-loading"><div class="spinner"></div><span>Generating summaries…</span></div></div>
  <div id="panel-3" class="panel"><div class="section-loading"><div class="spinner"></div><span>Generating summaries…</span></div></div>
  <div class="update-bar">Summaries regenerate on every reload · Click card body to mark as read</div>
</div>

<script>
// ── Read state via URL hash ───────────────────────────────────
function getRead() {
  try {
    const h = location.hash.replace('#','');
    return new Set(h ? h.split(',').map(Number).filter(n => !isNaN(n)) : []);
  } catch { return new Set(); }
}
function saveRead(s) {
  try {
    const v = [...s].join(',');
    history.replaceState(null,'', v ? '#'+v : location.pathname+location.search);
  } catch {}
}
function toggleRead(id) {
  const s = getRead();
  s.has(id) ? s.delete(id) : s.add(id);
  saveRead(s);
  const card = document.getElementById('c'+id);
  if (card) {
    card.classList.toggle('is-read', s.has(id));
    const hint = card.querySelector('.read-hint');
    if (hint) hint.textContent = s.has(id) ? 'Click to unmark' : 'Click to mark as read';
  }
}

// ── Tabs ──────────────────────────────────────────────────────
document.getElementById('tabBar').addEventListener('click', e => {
  const t = e.target.closest('.tab'); if (!t) return;
  const idx = t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  document.getElementById('panel-'+idx).classList.add('active');
});

// ── Date ──────────────────────────────────────────────────────
document.getElementById('headerDate').textContent = new Date().toLocaleDateString(
  'en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

// ── News data ─────────────────────────────────────────────────
const NEWS = [
  {p:0,tag:'tech',cat:'Tech & AI',src:'SiliconANGLE',

   raw:"Top 2026 aesthetics trends include preventive 'prejuvenation' anti-aging, GLP-1-combined body contouring, and surging biostimulatory injectable demand."},
  {p:3,tag:'aesthetics',cat:'Med Aesthetics',src:'MedEsthetics',
   url:'https://www.medestheticsmag.com/home/article/22957605/insideout-and-innovative-whats-trending-in-aesthetics-for-2026',
   title:'Aesthetics Industry Pivots to Inside-Out Regenerative Care',
   raw:'The 2026 aesthetics movement is shifting toward holistic inside-out regenerative protocols combining biocompatible technology and whole-body personalised wellness.'},
];

// ── Safely encode URL for HTML attribute ─────────────────────
function safeUrl(url) {
  return url.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeText(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Build card HTML with REAL <a> tags ───────────────────────
function buildCards(items) {
  const readSet = getRead();
  return '<div class="news-list">' + items.map(item => {
    const isRead = readSet.has(item.id);
    const hurl = safeUrl(item.url);
    return `
      <div class="news-card${isRead ? ' is-read' : ''}" id="c${item.id}" onclick="toggleRead(${item.id})">
        <div class="card-top">
          <span class="cat-tag tag-${item.tag}">${item.cat}</span>
          <span class="card-source">${safeText(item.src)}</span>
          <span class="read-dot">✓ Read</span>
        </div>
        <div class="card-title">
          <a class="title-link"
             href="${hurl}"
             target="_blank"
             rel="noopener noreferrer"
             onclick="event.stopPropagation()">${safeText(item.title)}</a>
        </div>
        <div class="card-summary" id="s${item.id}"><div class="shimmer"></div></div>
        <div class="card-footer">
          <a class="story-link"
             href="${hurl}"
             target="_blank"
             rel="noopener noreferrer"
             onclick="event.stopPropagation()">Full story →</a>
        </div>
        <div class="read-hint">${isRead ? 'Click to unmark' : 'Click to mark as read'}</div>
      </div>
    `;
  }).join('') + '</div>';
}

NEWS.forEach((item, i) => item.id = i);
const byPanel = {};
NEWS.forEach(item => { (byPanel[item.p] = byPanel[item.p] || []).push(item); });
for (const [p, items] of Object.entries(byPanel)) {
  document.getElementById('panel-'+p).innerHTML = buildCards(items);
}

// ── Generate one-sentence summaries ──────────────────────────
(async () => {
  try {
    const res = await window.cowork.sample(
      'You are a sharp news editor. For each item in the input array, write exactly ONE sentence (15–22 words) summarizing the key fact. Be direct and informative. Return ONLY a valid JSON array of strings in the same order. No markdown, no extra text.',
      NEWS.map(n => n.raw)
    );
    if (!res.isError) {
      const m = res.text.match(/\[[\s\S]*\]/);
      if (m) {
        JSON.parse(m[0]).forEach((txt, i) => {
          const el = document.getElementById('s'+i);
          if (el) el.textContent = typeof txt === 'string' ? txt : (NEWS[i]||{}).raw||'';
        });
        return;
      }
    }
    throw 0;
  } catch {
    NEWS.forEach(item => {
      const el = document.getElementById('s'+item.id);
      if (el) el.textContent = item.raw;
    });
  }
})();
</script>
