<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Digest</title>
  <style>
    :root { color-scheme: light; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #f4f4f6;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #111827; }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
      padding: 3px 8px; border-radius: 20px;
      background: #dcfce7; color: #15803d;
    }
    .header-date { font-size: 13px; color: #9ca3af; }

    /* ── Tabs ── */
    .tabs {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 28px;
      display: flex;
      overflow-x: auto;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center; gap: 7px;
      padding: 14px 18px;
      font-size: 13.5px; font-weight: 500;
      color: #9ca3af; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s;
      user-select: none;
    }
    .tab:hover:not(.active) { color: #374151; }
    .tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }

    /* ── Main ── */
    .main { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .news-list { display: flex; flex-direction: column; gap: 12px; }

    /* ── Card ── */
    .news-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px 16px;
      border: 1px solid #e5e7eb;
      transition: box-shadow 0.2s, transform 0.12s, opacity 0.25s, background 0.25s;
      position: relative;
    }
    .news-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    /* Read state */
    .news-card.is-read {
      background: #f9f9fb;
      opacity: 0.55;
    }
    .news-card.is-read .card-title a { color: #adb5bd !important; }
    .news-card.is-read .card-summary  { color: #ced4da; }
    .news-card.is-read .story-link    { color: #ced4da !important; }

    .read-hint {
      position: absolute; bottom: 10px; left: 22px;
      font-size: 10.5px; color: #d1d5db;
      pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
    .news-card:hover .read-hint { opacity: 1; }

    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .cat-tag {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.4px;
      text-transform: uppercase; padding: 3px 9px; border-radius: 6px; flex-shrink: 0;
    }
    .tag-tech       { background: #eef2ff; color: #4338ca; }
    .tag-business   { background: #ecfdf5; color: #065f46; }
    .tag-biotech    { background: #faf5ff; color: #7e22ce; }
    .tag-aesthetics { background: #fff1f2; color: #be123c; }

    .card-source { font-size: 12px; color: #9ca3af; }
    .age-tag {
      font-size: 10.5px; font-weight: 600; padding: 2px 7px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .age-fresh   { background: #dcfce7; color: #15803d; }   /* ≤ 7 days */
    .age-recent  { background: #fef9c3; color: #854d0e; }   /* 8–30 days */
    .age-old     { background: #f3f4f6; color: #9ca3af; }   /* > 30 days */
    .spacer { flex: 1; }
    .read-dot { font-size: 11px; color: #9ca3af; display: none; }
    .news-card.is-read .read-dot { display: inline; }

    .card-title {
      font-size: 15px; font-weight: 650; color: #111827;
      line-height: 1.45; margin-bottom: 8px;
    }
    .card-title a {
      color: #111827;
      text-decoration: none;
    }
    .card-title a:hover { color: #4f46e5; text-decoration: underline; }

    .card-summary {
      font-size: 13.5px; color: #4b5563;
      line-height: 1.7; transition: color 0.2s;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
    }
    .mark-read-btn {
      font-size: 11.5px; color: #9ca3af;
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .mark-read-btn:hover { background: #f3f4f6; color: #374151; }
    .news-card.is-read .mark-read-btn { color: #4f46e5; }

    .story-link {
      font-size: 13px; font-weight: 600; color: #4f46e5;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px;
      background: #eef2ff;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .story-link:hover { background: #e0e7ff; text-decoration: none; }

    /* ── Footer bar ── */
    .update-bar {
      text-align: center; font-size: 11.5px; color: #c4c4cc;
      padding: 20px 0 4px;
    }
    .update-bar a { color: #9ca3af; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">📰 Daily Digest</span>
    <span class="badge">LIVE</span>
  </div>
  <div class="header-date" id="headerDate">—</div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="0">🤖 Tech &amp; AI</div>
  <div class="tab" data-tab="1">📈 Business &amp; Finance</div>
  <div class="tab" data-tab="2">🧬 Biotech</div>
  <div class="tab" data-tab="3">✨ Med Aesthetics</div>
</div>

<div class="main">
  <div id="panel-0" class="panel active"></div>
  <div id="panel-1" class="panel"></div>
  <div id="panel-2" class="panel"></div>
  <div id="panel-3" class="panel"></div>
  <div class="update-bar">
    Last updated: <span id="lastUpdated">April 24, 2026</span>
    &nbsp;·&nbsp; Click a card to mark as read
  </div>
</div>

<script>
// @@NEWS_START@@

  // Last updated: April 24, 2026

  {p:0,tag:'tech',cat:'Tech & AI',src:'AI | The Verge',url:'https://www.theverge.com/gadgets/918016/prestigious-photo-contest-answers-what-is-a-photo',title:'Prestigious photo contest answers ‘what is a photo?’',summary:'We love to muse over how "real" photography is defined here at The Verge now that generative AI is so prolific, and the World Press Photo competition might have the answer. The prestigious award celebrates the best of…',age:'Today'},
  {p:0,tag:'tech',cat:'Tech & AI',src:'MIT Technology Review',url:'https://www.technologyreview.com/2026/04/24/1136352/health-care-ai-dont-know-actually-helps-patients/',title:'Health-care AI is here. We don’t know if it actually helps patients.',summary:'I don’t need to tell you that AI is everywhere. Or that it is being used, increasingly, in hospitals. Doctors are using AI to help them with notetaking. AI-based tools are trawling through patient records, flagging…',age:'Today'},

  {p:0,tag:'tech',cat:'Tech & AI',src:'TechCrunch',url:'https://techcrunch.com/2026/04/23/bob-iger-rejoins-thrive-capital-as-advisor-after-disney-exit/',title:'Bob Iger rejoins Thrive Capital as advisor after Disney exit',summary:'The former Disney CEO hold a stake in Thrive, and has previously held the role of the venture partner at the firm.',age:'Today'},
  {p:1,tag:'business',cat:'Business',src:'Business News',url:'https://www.cnbc.com/2026/04/23/nike-job-cuts-layoffs.html',title:'Nike cuts 1,400 roles in second round of layoffs this year',summary:'Nike announced 1,400 layoffs, primarily in its technology department, on Thursday after cutting 775 jobs in January.',age:'Today'},
  {p:1,tag:'business',cat:'Business',src:'Business News',url:'https://www.cnbc.com/2026/04/24/new-york-pied-a-terre-tax.html',title:'New York\'s pied-a-terre tax sets up legal fight over values',summary:'NYC\'s property tax system undervalues co-ops and condos, so experts said the city will have to come up with a new system for valuing high-end second homes.',age:'Today'},
  {p:1,tag:'business',cat:'Business',src:'Business News',url:'https://www.cnbc.com/2026/04/23/luxury-real-estate.html',title:'What $1 million buys you in real estate around the world',summary:'Luxury real estate in most major markets around the world continues to become more expensive, as the wealthy grow wealthier and more mobile.',age:'Today'},
  {p:1,tag:'business',cat:'Business',src:'NYT > Business',url:'https://www.nytimes.com/video/business/100000010852324/whos-getting-a-tariff-refund.html',title:'Who’s Getting a Tariff Refund?',summary:'Following a Supreme Court ruling that struck down several Trump administration tariffs, importers have begun applying for their share of $166 billion in refunds. As our economic policy reporter Tony Romm explains…',age:'Today'},
  {p:1,tag:'business',cat:'Business',src:'NYT > Business',url:'https://www.nytimes.com/2026/04/24/business/cohere-aleph-alpha-ai-merger.html',title:'A.I. Start-Ups From Canada and Germany Merge to Take On Silicon Valley',summary:'Cohere is acquiring Aleph Alpha in a deal aimed at customers uneasy about the dominance of American companies in artificial intelligence.',age:'Today'},
  {p:2,tag:'biotech',cat:'Biotech',src:'STAT',url:'https://www.statnews.com/2026/04/24/science-journal-retractions-highlight-guest-editor-special-edition-problem/?utm_campaign=rss',title:'Growing use of guest editors has turned some journals into a ‘playground of bad science’',summary:'The problematic use of guest editors was spotlighted last week when a genetics journal retracted nearly an entire special issue.',age:'Today'},
  {p:2,tag:'biotech',cat:'Biotech',src:'STAT',url:'https://www.statnews.com/2026/04/24/local-news-crisis-health-science-reporters-public-health/?utm_campaign=rss',title:'Opinion: The local news crisis is also a public health crisis',summary:'Health and science reporting is often treated as optional coverage. It is anything but.',age:'Today'},
  {p:2,tag:'biotech',cat:'Biotech',src:'STAT',url:'https://www.statnews.com/2026/04/24/white-house-boosts-psychedelic-treatments-status-report-alex-hogan/?utm_campaign=rss',title:'Psychedelics get a boost from the White House',summary:'In this week’s STATus Report, host Alex Hogan chats with STAT Washington correspondent Daniel Payne about Trump\'s psychedelics EO.',age:'Today'},
  {p:2,tag:'biotech',cat:'Biotech',src:'STAT',url:'https://www.statnews.com/2026/04/24/medical-school-late-in-life-np-to-md/?utm_campaign=rss',title:'Opinion: I started medical school at 69 and will begin residency at 72. Here’s what I learned',summary:'Starting residency at 72 isn’t for the faint of heart. But that’s what Dawn Zuidegeest-Craft is doing.',age:'Today'},
  {p:2,tag:'biotech',cat:'Biotech',src:'Biotechnology : nature.com subject feeds',url:'https://www.nature.com/articles/s44222-026-00438-2',title:'Engineered cells as programmable mRNA delivery vehicles',summary:'Engineered cells as programmable mRNA delivery vehicles',age:'Today'},

];
// @@NEWS_END@@

// ── Read state via localStorage ───────────────────────────────
const STORE_KEY = 'digest_read_v1';
function getRead() {
  try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveRead(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify([...s])); } catch {}
}
function toggleRead(id) {
  const s = getRead();
  s.has(id) ? s.delete(id) : s.add(id);
  saveRead(s);
  const card = document.getElementById('c'+id);
  if (!card) return;
  const isRead = s.has(id);
  card.classList.toggle('is-read', isRead);
  const btn  = card.querySelector('.mark-read-btn');
  const hint = card.querySelector('.read-hint');
  if (btn)  btn.textContent  = isRead ? '↩ Unmark' : '✓ Mark as read';
  if (hint) hint.textContent = isRead ? 'Click to unmark' : 'Click to mark as read';
}

// ── Tabs ──────────────────────────────────────────────────────
document.getElementById('tabBar').addEventListener('click', e => {
  const t = e.target.closest('.tab'); if (!t) return;
  const idx = t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  document.getElementById('panel-'+idx).classList.add('active');
});

// ── Date ──────────────────────────────────────────────────────
document.getElementById('headerDate').textContent = new Date().toLocaleDateString(
  'en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

// ── Render ────────────────────────────────────────────────────
function safeText(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ageClass(age) {
  if (!age) return '';
  if (age === 'Today' || age === 'Yesterday' || age.includes('d ago')) {
    const n = age === 'Today' ? 0 : age === 'Yesterday' ? 1 : parseInt(age);
    return n <= 7 ? 'age-fresh' : 'age-recent';
  }
  return 'age-old';
}
function buildCards(items) {
  const readSet = getRead();
  return '<div class="news-list">' + items.map(item => {
    const isRead = readSet.has(item.id);
    const ageBadge = item.age
      ? `<span class="age-tag ${ageClass(item.age)}">${safeText(item.age)}</span>` : '';
    return `
      <div class="news-card${isRead?' is-read':''}" id="c${item.id}" onclick="toggleRead(${item.id})" style="cursor:pointer">
        <div class="card-top">
          <span class="cat-tag tag-${item.tag}">${item.cat}</span>
          <span class="card-source">${safeText(item.src)}</span>
          <span class="spacer"></span>
          ${ageBadge}
          <span class="read-dot">✓ Read</span>
        </div>
        <div class="card-title">
          <a href="${safeText(item.url)}" target="_blank" rel="noopener noreferrer"
             onclick="event.stopPropagation()">${safeText(item.title)}</a>
        </div>
        <div class="card-summary">${safeText(item.summary)}</div>
        <div class="card-footer">
          <button class="mark-read-btn" onclick="event.stopPropagation(); toggleRead(${item.id})">
            ${isRead ? '↩ Unmark' : '✓ Mark as read'}
          </button>
          <a class="story-link" href="${safeText(item.url)}" target="_blank"
             rel="noopener noreferrer" onclick="event.stopPropagation()">
            Full story →
          </a>
        </div>
        <div class="read-hint">${isRead ? 'Click to unmark' : 'Click to mark as read'}</div>
      </div>`;
  }).join('') + '</div>';
}

NEWS.forEach((item, i) => item.id = i);
const byPanel = {};
NEWS.forEach(item => { (byPanel[item.p] = byPanel[item.p]||[]).push(item); });
for (const [p, items] of Object.entries(byPanel)) {
  document.getElementById('panel-'+p).innerHTML = buildCards(items);
}
</script>
</body>
</html>
