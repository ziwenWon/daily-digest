name: Daily News Update

on:
  schedule:
    # 00:00 UTC = 09:00 KST — runs every morning
    - cron: '0 0 * * *'
  workflow_dispatch:   # also lets you trigger manually from GitHub

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch news and update index.html
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config user.name  "Daily Digest Bot"
          git config user.email "actions@github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Nothing changed today."
          else
            git commit -m "Daily update: $(date -u '+%Y-%m-%d')"
            git push
          fi
